<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Radar de Concursos · Entrada</title>
  <style>
    @font-face {
      font-family: 'Folio Lt Light';
      src: url('/static/Folio-Light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ink: #e2e8f0;
      --muted: #94a3b8;
      --card: rgba(10, 16, 30, 0.72);
      --line: rgba(148, 163, 184, 0.25);
      --accent: #60a5fa;
      --accent-2: #93c5fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Folio Lt Light', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 80%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(2px 2px at 50% 45%, rgba(255,255,255,.9), transparent 65%),
        linear-gradient(180deg, #060b17 0%, #0a1020 50%, #0d1324 100%);
      background-size: 220px 220px, 300px 300px, 260px 260px, 320px 320px, 380px 380px, cover;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      background: radial-gradient(circle at center, transparent 0 58%, rgba(96,165,250,.08) 75%, transparent 100%);
      animation: drift 28s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.08); }
    }

    .card {
      width: min(92vw, 460px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 45px rgba(0,0,0,.45);
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0.2px; }
    p { margin: 0 0 18px; color: var(--muted); }

    .field { display: grid; gap: 8px; }
    label { font-size: 13px; color: #cbd5e1; }

    input {
      width: 100%;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15, 23, 42, .72);
      color: #f8fafc;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,.25);
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: 1px solid #3b82f6;
      background: linear-gradient(180deg, var(--accent), #3b82f6);
      color: #fff;
      font-weight: 700;
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .walker-link {
      position: fixed;
      top: 8vh;
      left: 8vw;
      z-index: 0;
      display: inline-block;
      pointer-events: auto;
      animation: roam 13s ease-in-out infinite alternate;
      will-change: transform, top, left;
    }

    .walker {
      height: min(30vh, 280px);
      opacity: .9;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.55));
      transform-origin: center center;
      animation: hop 1.15s ease-in-out infinite, tilt 1.7s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    @keyframes roam {
      0%   { left: 6vw;  top: 10vh; }
      25%  { left: 68vw; top: 14vh; }
      50%  { left: 75vw; top: 62vh; }
      75%  { left: 22vw; top: 68vh; }
      100% { left: 8vw;  top: 28vh; }
    }

    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    @keyframes tilt {
      0%, 100% { rotate: -5deg; }
      50% { rotate: 6deg; }
    }

    .error { margin-top: 10px; color: #fecaca; font-size: 13px; }
  </style>
</head>
<body>
  <form class="card" method="post" autocomplete="off">
    {% csrf_token %}
    <h1>🚀 Radar de Concursos</h1>
    <p>Área protegida. Introduz a password para entrar.</p>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="••••••••••" required autofocus />
    </div>

    <button type="submit">Entrar</button>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </form>

  <a class="walker-link" href="https://en.wikipedia.org/wiki/Afonso_V_of_Portugal" target="_blank" rel="noopener noreferrer" aria-label="Afonso V of Portugal">
    <img class="walker" src="/static/afonso-v.png" alt="afonso" />
  </a>

  <audio id="introMusic" preload="auto" autoplay loop playsinline>
    <source src="/static/mp3_site.mp3" type="audio/mpeg" />
  </audio>

  <script>
    const introMusic = document.getElementById('introMusic');

    async function startMusic() {
      if (!introMusic) return;
      try {
        introMusic.volume = 0.45;
        await introMusic.play();
      } catch (e) {
        // Browser may block autoplay until first user interaction.
      }
    }

    window.addEventListener('load', startMusic);
    document.addEventListener('pointerdown', startMusic, { once: true });
    document.addEventListener('keydown', startMusic, { once: true });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') startMusic();
    });
  </script>
</body>
</html>
