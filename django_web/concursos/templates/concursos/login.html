<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Radar de Concursos · Entrada</title>
  <style>
    @font-face {
      font-family: 'Folio Lt Light';
      src: url('/static/Folio-Light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ink: #e2e8f0;
      --muted: #94a3b8;
      --card: rgba(10, 16, 30, 0.72);
      --line: rgba(148, 163, 184, 0.25);
      --accent: #60a5fa;
      --accent-2: #93c5fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Folio Lt Light', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 80%, rgba(255,255,255,.9), transparent 60%),
        radial-gradient(2px 2px at 50% 45%, rgba(255,255,255,.9), transparent 65%),
        linear-gradient(180deg, #060b17 0%, #0a1020 50%, #0d1324 100%);
      background-size: 220px 220px, 300px 300px, 260px 260px, 320px 320px, 380px 380px, cover;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: -50%;
      background: radial-gradient(circle at center, transparent 0 58%, rgba(96,165,250,.08) 75%, transparent 100%);
      animation: drift 28s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.08); }
    }

    .map-bg {
      position: fixed;
      left: 0;
      top: -8vh;
      width: 100vw;
      max-width: none;
      height: auto;
      opacity: 0;
      transition: opacity 1400ms ease;
      z-index: 0;
      pointer-events: none;
      filter: contrast(1.05) brightness(.9);
    }

    /* If viewport gets taller than wide, scale map vertically (can exceed old bounds). */
    @media (orientation: portrait) {
      .map-bg {
        width: auto;
        height: 125vh;
        left: 50%;
        top: -12vh;
        transform: translateX(-50%);
      }
    }

    body.map-on .map-bg { opacity: .92; }
    .easter-video { opacity: 0; }
    body.easter-on .easter-video { opacity: .94; }

    .card {
      width: min(92vw, 460px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 45px rgba(0,0,0,.45);
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0.2px; }
    p { margin: 0 0 18px; color: var(--muted); }

    .field { display: grid; gap: 8px; }
    label { font-size: 13px; color: #cbd5e1; }

    input {
      width: 100%;
      border: 1px solid rgba(148,163,184,.35);
      background: rgba(15, 23, 42, .72);
      color: #f8fafc;
      padding: 11px 12px;
      border-radius: 10px;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(96,165,250,.25);
    }

    button {
      margin-top: 14px;
      width: 100%;
      border: 1px solid #3b82f6;
      background: linear-gradient(180deg, var(--accent), #3b82f6);
      color: #fff;
      font-weight: 700;
      padding: 11px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .walker-link {
      position: fixed;
      top: 8vh;
      left: 8vw;
      z-index: 1;
      display: inline-block;
      pointer-events: auto;
      animation: roam 13s ease-in-out infinite alternate;
      will-change: transform, top, left;
    }

    .walker {
      height: min(30vh, 280px);
      opacity: .9;
      filter: drop-shadow(0 10px 24px rgba(0,0,0,.55));
      transform-origin: center center;
      animation: hop 1.15s ease-in-out infinite, tilt 1.7s ease-in-out infinite;
      user-select: none;
      -webkit-user-drag: none;
    }

    body.easter-frenzy .walker-link {
      animation: roam-frenzy 5.8s linear infinite alternate;
    }

    body.easter-frenzy .walker {
      animation:
        hop-frenzy .42s ease-in-out infinite,
        tilt-frenzy .5s ease-in-out infinite,
        zoom-frenzy 1.05s ease-in-out infinite;
    }

    body.easter-frenzy .walker.flip-on {
      animation:
        hop-frenzy .42s ease-in-out infinite,
        tilt-frenzy .5s ease-in-out infinite,
        zoom-frenzy 1.05s ease-in-out infinite,
        flip-hit .58s ease-in-out 1;
    }

    @keyframes roam {
      0%   { left: 6vw;  top: 10vh; }
      25%  { left: 68vw; top: 14vh; }
      50%  { left: 75vw; top: 62vh; }
      75%  { left: 22vw; top: 68vh; }
      100% { left: 8vw;  top: 28vh; }
    }

    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }

    @keyframes tilt {
      0%, 100% { rotate: -5deg; }
      50% { rotate: 6deg; }
    }

    @keyframes roam-frenzy {
      0%   { left: 3vw;  top: 12vh; }
      16%  { left: 72vw; top: 10vh; }
      33%  { left: 78vw; top: 66vh; }
      50%  { left: 20vw; top: 70vh; }
      66%  { left: 10vw; top: 22vh; }
      83%  { left: 58vw; top: 35vh; }
      100% { left: 6vw;  top: 58vh; }
    }

    @keyframes hop-frenzy {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-28px); }
    }

    @keyframes tilt-frenzy {
      0%, 100% { rotate: -14deg; }
      50% { rotate: 15deg; }
    }

    @keyframes zoom-frenzy {
      0%, 100% { scale: 1; }
      50% { scale: 1.24; }
    }

    @keyframes flip-hit {
      0% { transform: rotate(0deg) scale(1); }
      45% { transform: rotate(180deg) scale(1.08); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .audio-toggle {
      position: fixed;
      right: 14px;
      bottom: 12px;
      z-index: 5;
      border: none;
      background: transparent;
      color: #ffffff;
      font-family: 'Folio Lt Light', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      letter-spacing: .3px;
      cursor: pointer;
      opacity: .9;
      padding: 6px 8px;
    }
    .audio-toggle.off { color: #ef4444; }

    .error { margin-top: 10px; color: #fecaca; font-size: 13px; }
  </style>
</head>
<body data-elapsed="{{ walker_elapsed|default:0 }}">
  <img class="map-bg" src="/static/FraMauroDetailedMapInverted.jpg" alt="Mapa de fundo" />
  {% if easter_song == 'joseamorim' %}
  <video id="easterVideo" class="map-bg easter-video" autoplay loop playsinline>
    <source src="/static/sou-rei.mp4" type="video/mp4" />
  </video>
  {% endif %}
  <form class="card" method="post" autocomplete="off">
    {% csrf_token %}
    <h1>🚀 Radar de Concursos</h1>
    <p>Área protegida. Introduz a password para entrar.</p>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" placeholder="••••••••••" autofocus />
    </div>

    <button type="submit">Entrar</button>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </form>

  <a class="walker-link" style="animation-delay: {{ walker_delay_roam }};" href="https://en.wikipedia.org/wiki/Afonso_V_of_Portugal" target="_blank" rel="noopener noreferrer" aria-label="Afonso V of Portugal">
    <img class="walker" style="animation-delay: {{ walker_delay_hop }}, {{ walker_delay_tilt }};" src="/static/afonso-v.png" alt="afonso" />
  </a>

  <audio id="introMusic" preload="auto" autoplay loop playsinline>
    <source src="/static/mp3_site.mp3" type="audio/mpeg" />
  </audio>

  <button type="button" id="audioToggle" class="audio-toggle">Audio</button>

  <script>
    const introMusic = document.getElementById('introMusic');
    const easterVideo = document.getElementById('easterVideo');
    const audioToggle = document.getElementById('audioToggle');
    const walkerImg = document.querySelector('.walker');
    const activeKey = easterVideo ? 'login_easter_video_time' : null;
    let mapActivated = false;
    let beatLoopStarted = false;

    function activeMedia() {
      return easterVideo || introMusic;
    }

    function restorePlaybackTime() {
      const media = activeMedia();
      if (!media || !activeKey) return;
      const raw = localStorage.getItem(activeKey);
      const t = Number(raw || 0);
      if (!Number.isFinite(t) || t <= 0) return;

      const applyTime = () => {
        try {
          if (Number.isFinite(media.duration) && media.duration > 0) {
            media.currentTime = Math.min(t, Math.max(0, media.duration - 0.35));
          } else {
            media.currentTime = t;
          }
        } catch (e) {}
      };

      if (media.readyState >= 1) applyTime();
      else media.addEventListener('loadedmetadata', applyTime, { once: true });
    }

    function persistPlaybackTime() {
      const media = activeMedia();
      if (!media || !activeKey) return;
      try {
        localStorage.setItem(activeKey, String(media.currentTime || 0));
      } catch (e) {}
    }

    function refreshAudioToggle() {
      if (!audioToggle) return;
      const media = activeMedia();
      const isOff = !media || media.muted || media.volume === 0;
      audioToggle.classList.toggle('off', isOff);
    }

    function maybeSwitchToMap() {
      if (easterVideo) return;
      if (!introMusic || mapActivated) return;
      if (introMusic.currentTime >= 38) {
        document.body.classList.add('map-on');
        mapActivated = true;
      }
    }

    function triggerFlip() {
      if (!walkerImg) return;
      walkerImg.classList.remove('flip-on');
      void walkerImg.offsetWidth;
      walkerImg.classList.add('flip-on');
      setTimeout(() => walkerImg.classList.remove('flip-on'), 620);
    }

    function startBeatSyncedFlips() {
      if (!easterVideo || beatLoopStarted || !window.AudioContext) return;
      beatLoopStarted = true;

      const ctx = new AudioContext();
      const src = ctx.createMediaElementSource(easterVideo);
      const analyser = ctx.createAnalyser();
      analyser.fftSize = 256;
      src.connect(analyser);
      analyser.connect(ctx.destination);

      const data = new Uint8Array(analyser.frequencyBinCount);
      let lastHit = 0;

      const tick = () => {
        analyser.getByteFrequencyData(data);
        let bass = 0;
        for (let i = 0; i < 10; i++) bass += data[i];
        bass = bass / 10;

        const now = performance.now();
        if (bass > 158 && now - lastHit > 420) {
          triggerFlip();
          lastHit = now;
        }
        requestAnimationFrame(tick);
      };

      ctx.resume().then(() => requestAnimationFrame(tick)).catch(() => {});
    }

    async function startMusic() {
      const media = activeMedia();
      if (!media) return;
      try {
        if (easterVideo && introMusic) {
          introMusic.pause();
          introMusic.muted = true;
        }
        // Respeita o estado mute atual (não reativar áudio sozinho).
        media.volume = media.volume || 0.45;
        await media.play();
        if (easterVideo) {
          document.body.classList.add('easter-on');
          document.body.classList.add('easter-frenzy');
          startBeatSyncedFlips();
        }
      } catch (e) {
        // Browser may block autoplay until first user interaction.
      }
      refreshAudioToggle();
    }

    if (audioToggle) {
      audioToggle.addEventListener('click', () => {
        const media = activeMedia();
        if (!media) return;
        media.muted = !media.muted;
        if (!media.muted) startMusic();
        refreshAudioToggle();
      });
    }

    introMusic?.addEventListener('timeupdate', maybeSwitchToMap);

    const mediaForEvents = activeMedia();
    mediaForEvents?.addEventListener('timeupdate', persistPlaybackTime);
    window.addEventListener('beforeunload', persistPlaybackTime);

    window.addEventListener('load', () => {
      restorePlaybackTime();
      refreshAudioToggle();
      startMusic();
      setInterval(persistPlaybackTime, 1500);
    });
    document.addEventListener('pointerdown', startMusic, { once: true });
    document.addEventListener('keydown', startMusic, { once: true });
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') startMusic();
    });
  </script>
</body>
</html>
